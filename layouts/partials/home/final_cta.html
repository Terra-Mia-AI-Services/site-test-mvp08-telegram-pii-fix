{{- $hasContatti := index .Site.Params.page_slugs_by_lang "contatti" -}}
{{ if $hasContatti }}
<section class="border-t border-gray-200/70 bg-gray-50">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-14">
    <div class="rounded-3xl border border-gray-200 bg-white p-8 sm:p-10">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 class="text-2xl font-heading font-semibold text-gray-900">{{ i18n "home_final_title" }}</h2>
          <p class="mt-2 text-gray-600">{{ i18n "home_final_body" }}</p>
        </div>
        <a href="{{ partial "page-url.html" (dict "ctx" . "page_id" "contatti") }}" class="inline-flex items-center justify-center rounded-2xl bg-primary px-5 py-3 text-sm font-semibold text-white shadow-sm hover:opacity-95 transition">
          {{ i18n "home_final_cta" }}
        </a>
      </div>
    </div>
  </div>
</section>
{{ end }}
